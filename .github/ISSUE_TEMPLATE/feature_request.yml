name: Feature request
description: Suggest an improvement for a TRMNL plugin
title: "[Feature] "
labels:
  - enhancement
body:
  - type: dropdown
    id: plugin
    attributes:
      label: Plugin
      options:
        - RetroAchievements Dashboard
        - Elite Dangerous Commander Dashboard
        - WoW Character Companion
        - Bus A Coruña
        - General / Other
    validations:
      required: true

  - type: textarea
    id: request
    attributes:
      label: Requested feature
      description: Describe the feature or improvement.
    validations:
      required: true

  - type: textarea
    id: benefit
    attributes:
      label: Why would it be useful?
      description: Explain the problem it solves or how it improves the plugin.
    validations:
      required: true

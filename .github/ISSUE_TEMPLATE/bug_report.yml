name: Bug report
description: Report a problem with one of the TRMNL plugins
title: "[Bug] "
labels:
  - bug
body:
  - type: dropdown
    id: plugin
    attributes:
      label: Plugin
      description: Which plugin is affected?
      options:
        - RetroArchTRMNL
        - EDTRMNL Dashboard
        - WoW Character Dashboard
        - Pokémon Team Analyzer
        - ITranvias - Bus A Coruña
        - Other
    validations:
      required: true

  - type: input
    id: device
    attributes:
      label: TRMNL device and layout
      description: For example, TRMNL OG Full, TRMNL X Half Horizontal, or Quadrant.
      placeholder: TRMNL OG Full
    validations:
      required: true

  - type: textarea
    id: problem
    attributes:
      label: What happened?
      description: Describe the problem clearly.
      placeholder: Explain what you saw and when it started.
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: What did you expect?
      placeholder: Explain what should have happened instead.
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      description: List the steps that cause the problem, if known.
      placeholder: |
        1. Open...
        2. Select...
        3. Refresh...

  - type: textarea
    id: errors
    attributes:
      label: Error messages or screenshots
      description: Add any error message or attach a screenshot. Remove private information first.

  - type: checkboxes
    id: privacy
    attributes:
      label: Privacy check
      options:
        - label: I have removed API keys, tokens, webhook URLs, passwords, and other private information.
          required: true
